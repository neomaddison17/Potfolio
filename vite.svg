<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7f00ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="black"/>

  <!-- Gradient ring -->
  <circle cx="100" cy="100" r="80" stroke="url(#grad)" stroke-width="4" fill="none"/>

  <!-- Initials -->
  <text x="50%" y="52%" text-anchor="middle" fill="url(#grad)"
        font-size="60" font-family="Helvetica, Arial, sans-serif"
        font-weight="600" dy=".3em">
    NR
  </text>
</svg>
